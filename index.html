<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>הַסְּפִירָה לָאִיְפוֹן 17 שֶׁל לִיהִי</title>
<style>
:root{
--barColor: rgb(255,74,74);
--barPercent:0%;
}
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
font-family:Arial,"Noto Sans Hebrew",sans-serif;
background:linear-gradient(135deg,#ffd6e7,#ff9fc6);
display:grid;
place-items:center;
overflow:hidden;
}

/* לבבות מרחפים */
.hearts{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
font-size:22px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(10vh) scale(.8);opacity:0}
10%{opacity:1}
100%{transform:translateY(-110vh) scale(1.3);opacity:0}
}

.wrap{width:min(900px,calc(100% - 30px));}
.card{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(12px);
border-radius:30px;
padding:30px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
display:grid;
gap:25px;
}

.top{
display:grid;
grid-template-columns:280px 1fr;
gap:20px;
align-items:center;
}

.hero{display:grid;place-items:center}

.info h1{
margin:0;
font-size:3rem;
line-height:1.1;
color:#ffd84d;
text-shadow:0 2px 6px rgba(0,0,0,0.25);
}

.info p{
margin-top:10px;
font-size:1.2rem;
}

.highlight{
background:linear-gradient(90deg,#ff8ad2,#7bc9ff);
-webkit-background-clip:text;
color:transparent;
font-weight:800;
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.unit{
background:white;
border-radius:20px;
padding:18px;
text-align:center;
}

.num{font-size:2.5rem;font-weight:800}
.label{color:#666}

.track{
height:26px;
background:rgba(0,0,0,0.1);
border-radius:999px;
overflow:hidden;
}

.fill{
width:var(--barPercent);
height:100%;
background:var(--barColor);
transition:1s;
}

.footerNote{text-align:center;color:#666}

@media(max-width:760px){
.top{grid-template-columns:1fr}
.countdown{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="wrap">
<div class="card">

<div class="top">
<div class="hero">
<img src="https://upload.wikimedia.org/wikipedia/en/3/3c/Stitch_%28Lilo_%26_Stitch%29.png" alt="Stitch" style="width:220px;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.25));">
</div>

<div class="info">
<h1>לִיהִי סְמִילְגָה,<br><span class="highlight">הָאִיְפוֹן 17 בַּדֶּרֶךְ אֵלַיִךְ ✨</span></h1>
<p>סוֹפְרִים לְאָחוֹר עַד הָרֶגַע הַגָּדוֹל!</p>
</div>
</div>

<div class="countdown">
<div class="unit"><div class="num" id="days">0</div><div class="label">יָמִים</div></div>
<div class="unit"><div class="num" id="hours">0</div><div class="label">שָׁעוֹת</div></div>
<div class="unit"><div class="num" id="minutes">0</div><div class="label">דַּקּוֹת</div></div>
<div class="unit"><div class="num" id="seconds">0</div><div class="label">שְׁנִיּוֹת</div></div>
</div>

<div>
<div class="track">
<div class="fill" id="fill"></div>
</div>
</div>

<div class="footerNote" id="targetText"></div>

</div>
</div>

<script>
const startDate=new Date('2026-03-15');
const targetDate=new Date('2026-09-15');

const days=document.getElementById('days');
const hours=document.getElementById('hours');
const minutes=document.getElementById('minutes');
const seconds=document.getElementById('seconds');

function pad(n){return String(n).padStart(2,'0')}

function mixColor(progress){
let r,g,b=70
if(progress<0.5){
let t=progress/0.5
r=255
 g=Math.round(74+(214-74)*t)
}else{
let t=(progress-0.5)/0.5
r=Math.round(255+(73-255)*t)
 g=Math.round(214+(203-214)*t)
}
return `rgb(${r},${g},${b})`
}

function update(){
const now=new Date()
const total=targetDate-startDate
const elapsed=Math.max(0,Math.min(total,now-startDate))
const progress=elapsed/total

const diff=targetDate-now

if(diff<=0){
days.textContent='0'
hours.textContent='0'
minutes.textContent='0'
seconds.textContent='0'
return
}

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

days.textContent=d
hours.textContent=pad(h)
minutes.textContent=pad(m)
seconds.textContent=pad(s)

document.documentElement.style.setProperty('--barPercent',(progress*100)+'%')
document.documentElement.style.setProperty('--barColor',mixColor(progress))

const targetText=targetDate.toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
document.getElementById('targetText').textContent='תַּאֲרִיךְ הַיַּעַד: '+targetText
}

/* לבבות מרחפים */
function makeHearts(){
const container=document.getElementById('hearts')
const emojis=['💖','💗','💜','💙','❤️','💞']
for(let i=0;i<25;i++){
const h=document.createElement('div')
h.className='heart'
h.textContent=emojis[Math.floor(Math.random()*emojis.length)]

const size=16+Math.random()*24
h.style.fontSize=size+'px'

h.style.right=Math.random()*100+'%'
h.style.bottom=(-20-Math.random()*40)+'px'

h.style.animationDuration=(6+Math.random()*10)+'s'
h.style.animationDelay=Math.random()*5+'s'

container.appendChild(h)
}
}

makeHearts()
update()
setInterval(update,1000)
</script>

</body>
</html>
